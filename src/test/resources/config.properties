# ═══════════════════════════════════════════════════════════
# APPIUM CONFIGURATION — DatMan Calculator Automation
# ═══════════════════════════════════════════════════════════

# ── Platform ──────────────────────────────────────────────
platform=android

# ── Device (keys must match ConfigManager.java accessors) ─
device.name=emulator-5554
platform.version=16
app.package=com.google.android.calculator
app.activity=com.android.calculator2.Calculator

# ── Appium Server ─────────────────────────────────────────
appium.server.url=http://127.0.0.1:4723

# ── iOS (unused for now) ──────────────────────────────────
bundle.id=com.apple.mobilecalculator

# ── Timeouts ──────────────────────────────────────────────
implicit.wait.seconds=8
explicit.wait.seconds=15

# ── Reporting ─────────────────────────────────────────────
screenshot.dir=screenshots
extent.report.path=extent-reports/calculator-test-report.html
