# Appium Configuration — DatMan Calculator Automation
# ═══════════════════════════════════════════════════
# Edit these values to match your device and environment.

# ─── Platform ─────────────────────────────────────
# Options: android | ios
platform=android

# ─── Appium Server ────────────────────────────────
appium.server.url=http://127.0.0.1:4723

# ─── Android Configuration ────────────────────────
# Run: adb devices -l  to get your device name
device.name=emulator-5554
platform.version=14

# Default: AOSP Calculator (available on most emulators)
app.package=com.google.android.calculator
app.activity=com.google.android.calculator.Calculator

# ─── iOS Configuration ────────────────────────────
# Uncomment and fill if testing on iOS
# bundle.id=com.apple.mobilecalculator

# ─── Timeouts ─────────────────────────────────────
implicit.wait.seconds=10
explicit.wait.seconds=30

# ─── Output Paths ─────────────────────────────────
screenshot.dir=screenshots
extent.report.path=extent-reports/calculator-test-report.html

# ─── Log Level ─────────────────────────────────────
log.level=INFO
